{% extends "base.html" %}

{% block content %}
<h1>Teams</h1>

<h2>Add Team</h2>
<form method="POST">
    <label>Team Name:</label>
    <input type="text" name="team_name" required>

    <label>League:</label>
    <select name="league_id">
        {% for league in leagues %}
            <option value="{{ league.league_id }}">{{ league.league_name }}</option>
        {% endfor %}
    </select>

    <label>Owner:</label>
    <select name="owner_id">
        {% for owner in owners %}
            <option value="{{ owner.owner_id }}">{{ owner.owner_name }}</option>
        {% endfor %}
    </select>

    <button type="submit">Add Team</button>
</form>

<h2>Existing Teams</h2>
<table>
    <tr>
        <th>Team</th>
        <th>Owner</th>
        <th>Wins</th>
        <th>Losses</th>
        <th>Total Points</th>
    </tr>
    {% for team in teams %}
    <tr>
        <td><a href="{{ url_for('roster', team_id=team.team_id) }}">{{ team.team_name }}</a></td>
        <td>{{ team.owner_name }}</td>
        <td>{{ team.wins }}</td>
        <td>{{ team.losses }}</td>
        <td>{{ team.total_points }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
